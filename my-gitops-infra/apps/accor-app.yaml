apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redemption-api-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/waiyancrist-rgb/accor-redemption-eks-lab.git
    targetRevision: HEAD
    path: kubernetes/redemption-api
  destination:
    server: https://kubernetes.default.svc
    namespace: redemption
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true