apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # The Let's Encrypt production API endpoint
    server: https://acme-v02.api.letsencrypt.org/directory
    # Replace with your actual email to receive expiry notices
    email: waiyan.itprof@gmail.com 
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          ingressClassName: nginx