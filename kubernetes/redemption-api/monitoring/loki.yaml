apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.27.0
    chart: loki
    helm:
      values: |
        # 1. Force the SingleBinary deployment mode
        deploymentMode: SingleBinary

        # 2. Correctly assign replicas at the ROOT level
        singleBinary:
          replicas: 1

        write:
          replicas: 0

        read:
          replicas: 0

        backend:
          replicas: 0

        # 3. Internal Loki engine configurations
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: 'filesystem'
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true