apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.27.0
    chart: loki
    helm:
      values: |
        deploymentMode: SingleBinary

        # 1. Monolithic configuration with local ephemeral disk space
        singleBinary:
          replicas: 1
          persistence:
            enabled: false
          extraVolumes:
            - name: storage
              emptyDir: {}
          extraVolumeMounts:
            - name: storage
              mountPath: /var/loki

        # 2. Disable heavy distributed caching layers completely
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false

        # 3. Keep target microservice states turned off
        write:
          replicas: 0
        read:
          replicas: 0
        backend:
          replicas: 0

        # 4. Core Loki configuration
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: 'filesystem'
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true