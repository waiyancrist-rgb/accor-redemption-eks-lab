apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.27.0
    chart: loki
    helm:
      values: |
        # 1. Force Single Binary mode at the root level
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          singleBinary:
            replicas: 1
          
          # 2. Explicitly disable distributed components to pass validation
          distributor:
            enabled: false
          querier:
            enabled: false
          query_frontend:
            enabled: false
          index_gateway:
            enabled: false
          ingester:
            enabled: false
          ruler:
            enabled: false
          compactor:
            enabled: false

          # 3. Use local filesystem storage
          storage:
            type: 'filesystem'
            filesystem:
              chunks_directory: /tmp/loki/chunks
              rules_directory: /tmp/loki/rules
              admin_directory: /tmp/loki/admin

          # 4. Correct schema config for TSDB engine
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true