deploymentMode: SingleBinary

loki:
  auth_enabled: false
  singleBinary:
    replicas: 1
  
  # Explicitly disable all distributed components
  distributor:
    enabled: false
  querier:
    enabled: false
  query_frontend:
    enabled: false
  index_gateway:
    enabled: false
  ingester:
    enabled: false
  ruler:
    enabled: false
  compactor:
    enabled: false

  # Storage configuration
  storage:
    type: 'filesystem'
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
      admin_directory: /tmp/loki/admin

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h