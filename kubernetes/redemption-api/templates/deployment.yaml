apiVersion: apps/v1
kind: Deployment
metadata:
  name: redemption-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: redemption-api
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: redemption-api
  template:
    metadata:
      labels:
        app: redemption-api
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: redemption-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.image.containerPort }}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"