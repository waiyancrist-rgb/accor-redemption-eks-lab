apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redemption-api
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
spec:
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redemption-api
                port:
                  number: {{ .Values.service.port }}